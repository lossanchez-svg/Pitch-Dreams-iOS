name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use the latest available Xcode on the runner
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
          xcrun simctl list devices available | head -20

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for runtime,devs in d['devices'].items():
            if 'iOS' in runtime:
              for dev in devs:
                if 'iPhone' in dev['name'] and dev['isAvailable']:
                  print(f\"platform=iOS Simulator,id={dev['udid']}\")
                  sys.exit(0)
          " 2>/dev/null || echo "platform=iOS Simulator,name=iPhone 16")
          echo "Destination: $DEST"
          xcodebuild build \
            -project PitchDreams.xcodeproj \
            -scheme PitchDreams \
            -destination "$DEST" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Test (Unit Tests)
        run: |
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for runtime,devs in d['devices'].items():
            if 'iOS' in runtime:
              for dev in devs:
                if 'iPhone' in dev['name'] and dev['isAvailable']:
                  print(f\"platform=iOS Simulator,id={dev['udid']}\")
                  sys.exit(0)
          " 2>/dev/null || echo "platform=iOS Simulator,name=iPhone 16")
          xcodebuild test \
            -project PitchDreams.xcodeproj \
            -scheme PitchDreams \
            -destination "$DEST" \
            -configuration Debug \
            -skip-testing:PitchDreamsTests/APIContractTests \
            -skip-testing:PitchDreamsTests/EndToEndFlowTests \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14

  api-contract-tests:
    runs-on: macos-15
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run API Contract Tests
        run: |
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for runtime,devs in d['devices'].items():
            if 'iOS' in runtime:
              for dev in devs:
                if 'iPhone' in dev['name'] and dev['isAvailable']:
                  print(f\"platform=iOS Simulator,id={dev['udid']}\")
                  sys.exit(0)
          " 2>/dev/null || echo "platform=iOS Simulator,name=iPhone 16")
          xcodebuild test \
            -project PitchDreams.xcodeproj \
            -scheme PitchDreams \
            -destination "$DEST" \
            -configuration Debug \
            -only-testing:PitchDreamsTests/APIContractTests \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath APITestResults.xcresult
        continue-on-error: true

      - name: Upload API Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: APITestResults.xcresult
          retention-days: 14
