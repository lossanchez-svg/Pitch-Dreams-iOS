name: PitchDreams
options:
  bundleIdPrefix: com.pitchdreams
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  # Rive runtime for playback of .riv hero-quality animations. Free tier
  # suffices under $1M ARR (per rive.app pricing as of 2026). Version
  # pinned to a major so dot-version updates flow automatically.
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios
    from: "6.0.0"

targets:
  PitchDreams:
    type: application
    platform: iOS
    sources:
      - PitchDreams
    dependencies:
      - package: RiveRuntime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitchdreams.training
        INFOPLIST_FILE: PitchDreams/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    scheme:
      testTargets:
        - PitchDreamsTests
      storeKitConfiguration: PitchDreams.storekit

  PitchDreamsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PitchDreamsTests
    dependencies:
      - target: PitchDreams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitchdreams.training.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PitchDreams.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PitchDreams"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  PitchDreams:
    build:
      targets:
        PitchDreams: all
        PitchDreamsTests: [test]
    test:
      targets:
        - PitchDreamsTests
