name: PitchDreams
options:
  bundleIdPrefix: com.pitchdreams
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  PitchDreams:
    type: application
    platform: iOS
    sources:
      - PitchDreams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitchdreams.training
        INFOPLIST_FILE: PitchDreams/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    scheme:
      testTargets:
        - PitchDreamsTests
      storeKitConfiguration: PitchDreams.storekit

  PitchDreamsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PitchDreamsTests
    dependencies:
      - target: PitchDreams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitchdreams.training.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PitchDreams.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PitchDreams"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  PitchDreams:
    build:
      targets:
        PitchDreams: all
        PitchDreamsTests: [test]
    test:
      targets:
        - PitchDreamsTests
