<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#0C1322] flex justify-between items-center w-full px-6 py-4 fixed top-0 z-50">
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform text-[#FF6B2C]">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
<h1 class="text-[#FF6B2C] font-['Plus_Jakarta_Sans'] font-black tracking-tighter uppercase text-xl">DRILL COMPLETE</h1>
<div class="relative active:scale-95 transition-transform">
<div class="w-10 h-10 rounded-full border-2 border-secondary overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Close up portrait of a young athletic soccer player with a focused and confident expression in cinematic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCE4j7mmy9wmS3ZOpCvgt6MO_-tQ7VqV8Ks9LU0o_jUDMs057WxAC8ahNgbxAxibgp1z8XXVDi4YiOAwRW_OdPsYVCQOArxcreZzZk59Q5nks2SYXADF29CYo6PHJwWe40mFI2YQg0kbXndXkOf1Z4M4j2FmcSZjM7KRfhDeT74RzhUTSHaVhkSuHlr7wUtZO1rJzQytqO7grJSlstqj50JhAYXwFt-FtWVvZe9kqi332bkrWv86GSI6AtLp1iu-FtCyqiGUglEPlo"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pt-24 pb-32 max-w-md mx-auto w-full text-center">
<!-- Success State Header -->
<div class="mb-12 flex flex-col items-center">
<div class="mb-6 active:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-[88px] text-secondary" style="font-variation-settings: 'FILL' 1;">new_releases</span>
</div>
<h2 class="text-[28px] font-black font-headline text-on-surface leading-tight mb-1">Drill Complete!</h2>
<p class="text-[18px] font-medium text-slate-400">Still Ball Scissor</p>
</div>
<!-- Stats Bento Row -->
<div class="grid grid-cols-2 gap-4 w-full mb-12">
<div class="bg-surface-container-low rounded-lg p-6 flex flex-col items-center justify-center ghost-border">
<span class="text-[10px] font-bold tracking-[3px] uppercase text-slate-400 mb-2">REPS</span>
<span class="text-3xl font-mono font-extrabold text-on-background">42</span>
</div>
<div class="bg-surface-container-low rounded-lg p-6 flex flex-col items-center justify-center ghost-border">
<span class="text-[10px] font-bold tracking-[3px] uppercase text-slate-400 mb-2">TIME</span>
<span class="text-3xl font-mono font-extrabold text-on-background">3:15</span>
</div>
</div>
<!-- Confidence Rating Section -->
<div class="w-full mb-12">
<h3 class="text-base font-medium text-on-surface mb-6">How did that feel?</h3>
<div class="flex justify-center gap-5 mb-4">
<!-- 1 Star -->
<button class="text-slate-600 hover:text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-3xl">star</span>
</button>
<!-- 2 Stars -->
<button class="text-slate-600 hover:text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-3xl">star</span>
</button>
<!-- 3 Stars -->
<button class="text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="block text-[10px] font-bold tracking-[1px] uppercase mt-1">ok</span>
</button>
<!-- 4 Stars -->
<button class="text-slate-600 hover:text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-3xl">star</span>
</button>
<!-- 5 Stars -->
<button class="text-slate-600 hover:text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-3xl">star</span>
</button>
</div>
</div>
<!-- Action Area -->
<div class="w-full space-y-6">
<button class="cta-gradient w-full h-[56px] rounded-full flex items-center justify-center px-8 active:scale-95 transition-transform shadow-[0_10px_25px_rgba(255,107,44,0.2)]">
<span class="text-on-primary font-black font-headline tracking-wider text-sm uppercase">NEXT DRILL · WALKING SCISSOR</span>
</button>
<button class="w-full text-secondary font-medium text-sm underline underline-offset-4 decoration-2 hover:opacity-80 active:scale-95 transition-all">
                TRY AGAIN
            </button>
</div>

<span class="font-['Plus_Jakarta_Sans'] font-bold text-[10px] tracking-[2px] uppercase">STADIUM</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:text-[#46E5F8] transition-colors">
<span class="material-symbols-outlined mb-1">leaderboard</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[10px] tracking-[2px] uppercase">STATS</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:text-[#46E5F8] transition-colors">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[10px] tracking-[2px] uppercase">PROFILE</span>
</div>
