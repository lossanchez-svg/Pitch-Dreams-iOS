<body class="bg-surface-container-lowest text-on-surface font-body flex items-start justify-center min-h-screen gap-12 p-10 overflow-x-auto">
<!-- Frame A: Intro -->
<div class="relative w-[393px] h-[852px] bg-background rounded-[48px] overflow-hidden flex flex-col items-center justify-between shadow-2xl shrink-0">
<!-- Status Bar Mock -->
<div class="w-full h-12 flex justify-between items-center px-8 pt-4">
<span class="text-sm font-bold">9:41</span>
<div class="flex gap-1.5">
<div class="w-4 h-4 rounded-full border border-on-surface/20"></div>
<div class="w-4 h-4 rounded-full border border-on-surface/20"></div>
</div>
</div>
<div class="flex flex-col items-center px-8 text-center space-y-8">
<div class="w-24 h-24 rounded-full bg-primary-container/20 flex items-center justify-center animate-pulse">
<span class="material-symbols-outlined text-[72px] text-primary-container" style="font-variation-settings: 'FILL' 1;">videocam</span>
</div>
<div class="space-y-4">
<h1 class="text-[24px] font-extrabold uppercase tracking-tight text-tertiary font-headline">Film Yourself</h1>
<p class="text-[14px] leading-relaxed text-on-surface/80 font-medium">
                    10 seconds of your best scissor sequence. We'll save it to your Journey. Only you and your parents can see it.
                </p>
</div>
</div>
<div class="w-full px-8 pb-16 flex flex-col gap-4">
<button class="w-full h-[56px] cta-gradient rounded-full flex items-center justify-center text-on-primary-fixed font-extrabold text-[14px] tracking-widest uppercase shadow-lg active:scale-95 transition-transform">
                OPEN CAMERA
            </button>
<button class="w-full h-[56px] flex items-center justify-center text-secondary font-bold text-[11px] tracking-[2px] uppercase active:opacity-60 transition-opacity">
                SKIP THIS
            </button>
</div>
</div>
<!-- Frame B: Recording -->
<div class="relative w-[393px] h-[852px] bg-[#000000] rounded-[48px] overflow-hidden flex flex-col shadow-2xl shrink-0">
<!-- Camera View Area (Simulation) -->
<div class="absolute inset-0 bg-cover bg-center opacity-70" data-alt="POV of a soccer ball on a green pitch at night under stadium lights, athlete legs visible in motion" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAWKWN3Sm6n_Ny1K6p1LiXQ8Cxc-Uxphf36Me6IpyF-mk72RBycuSVLN1m9rDNAvzh_EedfwwrKvh-wdGsAfyUXWZ-Vouy5kTh1y21pw3dSF1SHJ3iGq-AE0V4CRGumo6PBWy2lOxoOorfuppnIefuluOmDfKRX3-G12XRI-koOD_8Ljx-45LeWT5qn6KCS-8mUb2LQwxdxeD39DHgmFc60llpqnWM1M37NbiWnMU5jaiwRxi2dQdeqijZ_naxvhuMmZq4oSTbibUk')">
<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>
</div>
<!-- Top Controls -->
<div class="relative w-full flex justify-between items-center px-8 pt-14 z-10">
<div class="bg-black/40 px-3 py-1 rounded-full border border-white/10">
<span class="text-[10px] font-bold tracking-[2px] uppercase text-white">RECORDING</span>
</div>
<button class="text-secondary">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">flip_camera_ios</span>
</button>
</div>
<!-- Countdown Overlay -->
<div class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none">
<span class="text-[64px] font-extrabold text-white tracking-tighter drop-shadow-2xl">3-2-1</span>
</div>
<!-- Bottom UI -->
<div class="mt-auto w-full flex flex-col items-center pb-16 z-10">
<div class="mb-8">
<span class="text-[48px] font-extrabold font-mono-stadium text-white tracking-tighter">00:04</span>
</div>
<!-- Record Button with Progress Ring -->
<div class="relative w-24 h-24 flex items-center justify-center">
<!-- Cyan Progress Ring (SVG) -->
<svg class="absolute w-full h-full -rotate-90">
<circle class="text-white/20" cx="48" cy="48" fill="transparent" r="44" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-secondary" cx="48" cy="48" fill="transparent" r="44" stroke="currentColor" stroke-dasharray="276" stroke-dashoffset="160" stroke-width="4"></circle>
</svg>
<!-- Red Button -->
<div class="w-20 h-20 rounded-full bg-white flex items-center justify-center p-1.5">
<div class="w-full h-full rounded-full bg-red-600 animate-pulse"></div>
</div>
</div>
</div>
</div>
<!-- Frame C: Review -->
<div class="relative w-[393px] h-[852px] bg-background rounded-[48px] overflow-hidden flex flex-col shadow-2xl shrink-0">
<!-- Video Player Area -->
<div class="w-full aspect-[3/4] bg-surface-container-high relative overflow-hidden rounded-b-[24px]">

<div class="absolute inset-0 flex items-center justify-center">
<div class="w-16 h-16 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center border border-white/20">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</div>
<!-- Scrubber -->
<div class="absolute bottom-4 left-6 right-6 h-1.5 bg-white/20 rounded-full overflow-hidden">
<div class="h-full w-2/3 bg-primary-container"></div>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-8 space-y-4">
<button class="w-full h-[56px] cta-gradient rounded-full flex items-center justify-center text-on-primary-fixed font-extrabold text-[14px] tracking-widest uppercase shadow-lg">
                SAVE
            </button>
<button class="w-full h-[56px] rounded-full flex items-center justify-center text-secondary font-extrabold text-[14px] tracking-widest uppercase border border-secondary/30 ghost-border active:bg-secondary/10">
                RETAKE
            </button>
<button class="w-full h-[40px] flex items-center justify-center text-on-surface/60 font-bold text-[11px] tracking-[2px] uppercase">
                SKIP THIS
            </button>
</div>
<div class="w-full text-center pb-12">
<span class="text-[11px] font-bold uppercase tracking-[2px] text-on-surface/40">Saved on this device only.</span>
</div>
</div>
