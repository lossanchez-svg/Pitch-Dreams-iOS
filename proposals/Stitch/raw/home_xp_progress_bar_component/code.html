            background-color: #0c1322;

<div class="w-[361px] h-[80px] bg-background rounded-[16px] ghost-border flex items-center px-4 relative overflow-hidden mb-6">

<div class="relative flex-shrink-0 w-10 h-10 rounded-full border-2 border-secondary overflow-hidden">

</div>

</div>

<div class="flex flex-col items-end gap-0.5">
<div class="flex items-center gap-1 text-[#FF6B2C]">

</div>
<span class="text-[8px] font-bold text-slate-500 tracking-[1px] uppercase">Next Rank</span>
</div>
</div>
<!-- Variant 2: Legend Stage -->
<div class="w-[361px] h-[80px] bg-background rounded-[16px] ghost-border flex items-center px-4 relative overflow-hidden">

<div class="relative flex-shrink-0 w-10 h-10 rounded-full border-2 border-tertiary overflow-hidden">

<div class="h-full rounded-full bg-gradient-to-r from-tertiary to-[#FFD700]" style="width: 100%;"></div>
</div>
<span class="font-mono-stadium font-extrabold text-[11px] text-tertiary tracking-widest">MAX LEVEL</span>
</div>
<!-- Right: Label -->
<div class="flex flex-col items-end">
<span class="font-headline font-extrabold text-[12px] text-tertiary tracking-[2px] uppercase">LEGEND</span>
<span class="material-symbols-outlined text-tertiary text-xs" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
</div>
</div>
</div>
<!-- Descriptive Content for Context -->
<div class="grid grid-cols-2 gap-4 w-full">
<div class="bg-surface-container p-6 rounded-lg ghost-border aspect-square flex flex-col justify-between">
<span class="material-symbols-outlined text-secondary text-3xl">fitness_center</span>
<div>
<h3 class="font-headline font-extrabold text-lg text-on-surface leading-tight">Morning Drill</h3>
<p class="text-slate-500 font-bold text-[9px] tracking-[2px] uppercase">Start Session</p>
</div>
</div>
<div class="bg-surface-container-high p-6 rounded-lg ghost-border aspect-square flex flex-col justify-between">
<span class="material-symbols-outlined text-primary text-3xl">leaderboard</span>

<span class="font-headline font-bold text-[10px] tracking-[3px] uppercase mt-1">TRAIN</span>

<span class="material-symbols-outlined">leaderboard</span>
<span class="font-headline font-bold text-[10px] tracking-[3px] uppercase mt-1">RANK</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 p-3 hover:text-[#46E5F8] active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">inventory_2</span>
<span class="font-headline font-bold text-[10px] tracking-[3px] uppercase mt-1">GEAR</span>
</button>
