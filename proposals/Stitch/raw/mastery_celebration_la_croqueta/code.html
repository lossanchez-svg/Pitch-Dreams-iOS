<!-- Main Content Canvas -->
<main class="relative flex flex-col items-center justify-center min-h-screen pt-20 pb-32 px-8 starlight-burst">
<!-- Mastery Header -->
<div class="text-center mb-4">
<h2 class="text-[48pt] font-black leading-none text-white mastered-stroke tracking-tight">MASTERED!</h2>
</div>
<!-- Identity Section -->
<div class="flex flex-col items-center gap-2 mb-12">
<h3 class="text-[32pt] font-extrabold text-secondary tracking-tight">La Croqueta</h3>
<!-- Move Icon -->
<div class="py-8">
<span class="material-symbols-outlined text-[120pt] text-secondary glow-cyan" style="font-variation-settings: 'FILL' 1, 'wght' 700;">
                    swap_horiz
                </span>
</div>
<p class="text-[14pt] italic font-medium text-tertiary tracking-wide opacity-90">
                Iniesta's disappearing act
            </p>
</div>
<!-- XP Banner -->
<div class="bg-gradient-to-r from-tertiary/10 via-tertiary/20 to-tertiary/10 px-12 py-4 rounded-full border border-tertiary/20 mb-16 shadow-[0_0_30px_rgba(217,196,154,0.15)]">
<span class="text-[24pt] font-black text-tertiary tracking-tighter">+250 XP</span>
</div>
<!-- Loadout Section -->
<div class="w-full max-w-sm">
<div class="flex flex-col gap-4 mb-8">
<p class="text-[9pt] font-bold uppercase tracking-[3px] text-white/40 text-center">Current Loadout</p>
<div class="flex justify-center gap-3">
<!-- Active Slot (La Croqueta) -->
<div class="w-[56px] h-[56px] rounded-[16pt] bg-surface-container-high ghost-border flex items-center justify-center border-secondary/40 border-[2px]">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">swap_horiz</span>
</div>
<!-- Empty/Locked Slots -->
<div class="w-[56px] h-[56px] rounded-[16pt] bg-surface-container-low ghost-border flex items-center justify-center">
<span class="material-symbols-outlined text-white/10">lock</span>
</div>
<div class="w-[56px] h-[56px] rounded-[16pt] bg-surface-container-low ghost-border flex items-center justify-center">
<span class="material-symbols-outlined text-white/10">add</span>
</div>
<div class="w-[56px] h-[56px] rounded-[16pt] bg-surface-container-low ghost-border flex items-center justify-center">
<span class="material-symbols-outlined text-white/10">add</span>
</div>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full h-[56px] rounded-full bg-gradient-to-br from-[#FFE6DE] to-[#FFD4C8] text-[#0C1322] font-black text-[14pt] uppercase tracking-wider shadow-[0_10px_30px_rgba(255,107,44,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-all">
                ADD TO MY CARD
            </button>
</div>

<div class="fixed bottom-10 right-8 z-50">
<button class="w-14 h-14 rounded-full bg-surface-container-highest ghost-border flex items-center justify-center text-secondary shadow-lg hover:bg-surface-bright transition-colors">
