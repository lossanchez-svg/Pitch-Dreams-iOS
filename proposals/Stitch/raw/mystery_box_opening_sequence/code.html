<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#ffb59a",
                    "on-tertiary-container": "#3c3012",
                    "on-error": "#690005",
                    "surface": "#0c1322",
                    "on-secondary": "#00363c",
                    "secondary-container": "#00c9db",
                    "secondary": "#46e5f8",
                    "error": "#ffb4ab",
                    "on-surface-variant": "#e2bfb3",
                    "on-surface": "#dce2f8",
                    "inverse-surface": "#dce2f8",
                    "surface-container-low": "#151b2b",
                    "surface-container": "#191f2f",
                    "tertiary": "#d9c49a",
                    "on-secondary-fixed-variant": "#004f57",
                    "secondary-fixed": "#91f1ff",
                    "surface-dim": "#0c1322",
                    "primary-fixed": "#ffdbcf",
                    "secondary-fixed-dim": "#33daec",
                    "primary": "#ffb59a",
                    "inverse-primary": "#a83900",
                    "surface-bright": "#32394a",
                    "on-tertiary": "#3b2f11",
                    "on-error-container": "#ffdad6",
                    "on-background": "#dce2f8",
                    "surface-container-high": "#232a3a",
                    "on-tertiary-fixed": "#251a01",
                    "primary-container": "#ff6b2c",
                    "on-primary-container": "#5c1c00",
                    "error-container": "#93000a",
                    "tertiary-fixed": "#f6e0b5",
                    "outline": "#a98a7f",
                    "on-primary-fixed-variant": "#802900",
                    "on-primary-fixed": "#380d00",
                    "on-primary": "#5b1b00",
                    "background": "#0c1322",
                    "tertiary-fixed-dim": "#d9c49a",
                    "outline-variant": "#594139",
                    "on-secondary-fixed": "#001f23",
                    "surface-container-lowest": "#070e1d",
                    "tertiary-container": "#aa9770",
                    "primary-fixed-dim": "#ffb59a",
                    "on-tertiary-fixed-variant": "#534525",
                    "on-secondary-container": "#004f57",
                    "inverse-on-surface": "#293041",
                    "surface-variant": "#2e3545",
                    "surface-container-highest": "#2e3545"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ghost-border {
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .starlight-pitch {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .isometric-box {
            transform: perspective(1000px) rotateX(30deg) rotateY(-45deg);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface min-h-screen starlight-pitch">
<!-- Top Navigation Anchor -->
<header class="bg-[#0C1322] flex justify-between items-center px-6 h-16 w-full sticky top-0 z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-orange-500 scale-95 active:duration-100 cursor-pointer" data-icon="arrow_back">arrow_back</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-widest uppercase text-xs text-orange-500">MYSTERY OPENING</h1>
</div>
<div class="w-10 h-10 rounded-full border-2 border-tertiary overflow-hidden hover:opacity-80 transition-opacity cursor-pointer">
<img alt="User Avatar" class="w-full h-full object-cover" data-alt="Close up portrait of a stylized athletic character with golden glowing eyes and sharp features, wearing premium cybernetic training gear" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpwhj8xBaDHVmvZOEbkriuKAj4huUTgljJogxt34Ghhv_3rU1ZBb_jkaUCc6DLiDq3bbcEnWkIpBTD3Uxeq7457gH4tEMb5hyeadj8QDlDEudF2RS3MgKfspaaJL7W7eCErV1b0Rgn7tRKlc2MTqtVhfSfFPT0O1NJ7FChlta34PH5Us4RFXK6UlT_xOOKdxNXE6ThL4SF-J13UD2AZG69U4yrORplrkpWFVsz1HsfmolMMDS5C5MMzVDrzNsZ-cqj8xbtxT13JZ4"/>
</div>
</header>
<main class="max-w-md mx-auto px-6 py-8 space-y-12 pb-32">
<!-- Frame A: The Shake -->
<section class="relative">
<div class="flex flex-col items-center">
<span class="font-label font-bold text-[10px] tracking-[0.2em] uppercase text-secondary mb-8">Frame A / T=0s</span>
<div class="relative w-64 h-64 flex items-center justify-center surface-container-highest rounded-lg overflow-hidden ghost-border">
<!-- Cyan Pulse Base -->
<div class="absolute bottom-0 w-48 h-12 bg-secondary/20 blur-2xl rounded-full translate-y-4"></div>
<!-- Shaking Box -->
<div class="isometric-box rotate-[-5deg] transition-transform duration-75">
<div class="w-32 h-32 bg-surface-container-high ghost-border relative">
<!-- Lid -->
<div class="absolute -top-4 -left-4 w-40 h-8 bg-primary-container shadow-xl"></div>
<!-- Side Decals -->
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-16 bg-on-primary-container/20"></div>
</div>
</div>
<!-- Pulse Glow -->
<div class="absolute inset-0 bg-gradient-to-t from-secondary/10 to-transparent"></div>
</div>
<div class="mt-6 text-center">
<h2 class="text-lg font-bold tracking-tight">KINETIC PREVIEW</h2>
<p class="text-xs text-slate-500 uppercase tracking-widest mt-1">Status: Shaking off-axis 5°</p>
</div>
</div>
</section>
<!-- Frame B: The Burst -->
<section class="relative">
<div class="flex flex-col items-center">
<span class="font-label font-bold text-[10px] tracking-[0.2em] uppercase text-tertiary mb-8">Frame B / T=1s</span>
<div class="relative w-64 h-64 flex items-center justify-center bg-surface-container-highest rounded-lg overflow-hidden ghost-border">
<!-- Vertical Beam -->
<div class="absolute h-full w-24 bg-gradient-to-t from-tertiary to-transparent blur-3xl opacity-60"></div>
<div class="absolute h-full w-4 bg-white/40 blur-md"></div>
<!-- Radial Burst Elements -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-48 h-48 border border-tertiary/20 rounded-full scale-125 opacity-30"></div>
<div class="w-64 h-64 border border-white/10 rounded-full scale-150 opacity-10"></div>
</div>
<!-- Box with Lifting Lid -->
<div class="isometric-box translate-y-4">
<div class="w-32 h-32 bg-surface-container-high ghost-border relative">
<!-- Lid lifting 30deg -->
<div class="absolute -top-12 -left-4 w-40 h-8 bg-primary-container shadow-2xl origin-bottom transform rotate-[-30deg]"></div>
<!-- Escape Light -->
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-white/30 to-transparent"></div>
</div>
</div>
<!-- Floating Particles -->
<div class="absolute top-1/4 left-1/3 w-1 h-1 bg-white rounded-full"></div>
<div class="absolute top-1/2 right-1/4 w-2 h-2 bg-tertiary/40 rounded-full"></div>
<div class="absolute bottom-1/4 right-1/3 w-1 h-1 bg-white/60 rounded-full"></div>
</div>
<div class="mt-6 text-center">
<h2 class="text-lg font-bold tracking-tight text-tertiary">POWER ASCENDING</h2>
<p class="text-xs text-slate-500 uppercase tracking-widest mt-1">Lid: 30° Vertical Ejection</p>
</div>
</div>
</section>
<!-- Frame C: The Reveal -->
<section class="relative">
<div class="flex flex-col items-center">
<span class="font-label font-bold text-[10px] tracking-[0.2em] uppercase text-primary mb-8">Frame C / T=1.5s</span>
<div class="relative w-64 h-64 flex items-center justify-center bg-surface-container-highest rounded-lg overflow-hidden ghost-border">
<!-- Pure White Light Column -->
<div class="absolute inset-0 bg-white/5 blur-3xl"></div>
<div class="absolute h-full w-40 bg-gradient-to-t from-white/20 via-white/40 to-transparent blur-2xl"></div>
<!-- Legendary Reveal -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-32 h-32 bg-gradient-to-br from-[#FFE6DE] to-[#FFD4C8] rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(255,107,44,0.6)]">
<span class="material-symbols-outlined text-surface text-6xl" data-icon="pets" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<!-- Lion Reward Silhouette Hint -->
<div class="mt-4">
<span class="font-headline font-black text-2xl tracking-tighter text-white">LEGENDARY LION</span>
</div>
</div>
<!-- Dissolving Box Particles -->
<div class="absolute bottom-12 w-32 h-4 bg-white/20 blur-lg rounded-full"></div>
</div>
<div class="mt-6 text-center">
<h2 class="text-xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-[#FFE6DE] to-[#FFD4C8]">REWARD MANIFEST</h2>
<p class="text-xs text-slate-500 uppercase tracking-widest mt-1">Status: Pure Light Dissolve</p>
</div>
</div>
</section>
<!-- Action Button -->
<div class="pt-8">
<button class="w-full h-14 bg-gradient-to-r from-[#FFE6DE] to-[#FFD4C8] rounded-full text-surface-container-lowest font-bold uppercase tracking-widest text-sm shadow-[0_8px_30px_rgba(255,107,44,0.3)] active:scale-95 transition-transform">
                CLAIM ALL REWARDS
            </button>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#0C1322]/95 shadow-[0_-8px_30px_rgb(7,14,29,0.5)] rounded-t-[32px]">
<div class="text-slate-500 p-3 hover:text-[#46E5F8] transition-colors active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined" data-icon="home">home</span>
</div>
<div class="text-slate-500 p-3 hover:text-[#46E5F8] transition-colors active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined" data-icon="fitness_center">fitness_center</span>
</div>
<div class="bg-gradient-to-r from-[#FFE6DE] to-[#FFD4C8] text-[#0C1322] rounded-full p-3 scale-110 shadow-[0_0_20px_rgba(255,107,44,0.4)] active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined" data-icon="Confirmation_Number">confirmation_number</span>
</div>
<div class="text-slate-500 p-3 hover:text-[#46E5F8] transition-colors active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
</div>
<div class="text-slate-500 p-3 hover:text-[#46E5F8] transition-colors active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
</nav>
</body></html>
