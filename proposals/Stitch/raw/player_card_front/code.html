<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed": "#001f23",
                    "on-primary-fixed": "#380d00",
                    "on-surface-variant": "#e2bfb3",
                    "surface": "#0c1322",
                    "inverse-primary": "#a83900",
                    "on-secondary-fixed-variant": "#004f57",
                    "primary": "#ffb59a",
                    "surface-container-lowest": "#070e1d",
                    "tertiary-container": "#aa9770",
                    "primary-container": "#ff6b2c",
                    "tertiary-fixed-dim": "#d9c49a",
                    "on-tertiary-fixed-variant": "#534525",
                    "tertiary-fixed": "#f6e0b5",
                    "secondary-container": "#00c9db",
                    "tertiary": "#d9c49a",
                    "on-secondary": "#00363c",
                    "outline-variant": "#594139",
                    "surface-container": "#191f2f",
                    "primary-fixed-dim": "#ffb59a",
                    "inverse-on-surface": "#293041",
                    "surface-container-high": "#232a3a",
                    "secondary": "#46e5f8",
                    "on-error-container": "#ffdad6",
                    "error-container": "#93000a",
                    "outline": "#a98a7f",
                    "on-tertiary-container": "#3c3012",
                    "surface-dim": "#0c1322",
                    "on-tertiary": "#3b2f11",
                    "on-primary": "#5b1b00",
                    "secondary-fixed-dim": "#33daec",
                    "on-primary-fixed-variant": "#802900",
                    "surface-bright": "#32394a",
                    "surface-tint": "#ffb59a",
                    "on-surface": "#dce2f8",
                    "on-error": "#690005",
                    "inverse-surface": "#dce2f8",
                    "on-tertiary-fixed": "#251a01",
                    "background": "#0c1322",
                    "surface-container-low": "#151b2b",
                    "error": "#ffb4ab",
                    "primary-fixed": "#ffdbcf",
                    "on-background": "#dce2f8",
                    "secondary-fixed": "#91f1ff",
                    "on-primary-container": "#5c1c00",
                    "surface-container-highest": "#2e3545",
                    "surface-variant": "#2e3545",
                    "on-secondary-container": "#004f57"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans", "sans-serif"],
                    "body": ["Plus Jakarta Sans", "sans-serif"],
                    "label": ["Plus Jakarta Sans", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .card-gradient-border {
            position: relative;
            background: #0c1322;
            border-radius: 1.5rem;
            z-index: 1;
        }
        .card-gradient-border::before {
            content: "";
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, #FF6B2C 0%, #FFE9BD 100%);
            border-radius: 1.5rem;
            z-index: -1;
        }
        .vignette {
            background: radial-gradient(circle, transparent 40%, rgba(12, 19, 34, 0.8) 100%);
        }
        .monospaced {
            font-variant-numeric: tabular-nums;
        }
        .glow-behind {
            background: radial-gradient(circle, rgba(255, 107, 44, 0.15) 0%, transparent 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container min-h-screen flex flex-col">
<!-- Header Section (Safe Area Aware) -->
<header class="flex items-center justify-between px-6 py-4 pt-12">
<button class="w-12 h-12 flex items-center justify-start text-on-surface">
<span class="material-symbols-outlined text-[28px]">arrow_back</span>
</button>
<h1 class="text-lg font-extrabold tracking-[-0.015em] uppercase">MY CARD</h1>
<button class="w-12 h-12 flex items-center justify-end text-on-surface">
<span class="material-symbols-outlined text-[28px]">share</span>
</button>
</header>
<!-- Centerpiece: Player Card -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pb-8">
<div class="card-gradient-border w-[340px] h-[453px] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.5)] overflow-hidden relative">
<!-- Vignette Overlay -->
<div class="absolute inset-0 vignette pointer-events-none z-10"></div>
<div class="relative z-20 flex flex-col h-full p-6">
<!-- 1. Header -->
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-[12px] bg-tertiary-container flex items-center justify-center border-2 border-tertiary shadow-lg overflow-hidden" data-alt="club crest badge with a central gold star and geometric stripe patterns on a deep blue background">
<span class="material-symbols-outlined text-tertiary-fixed" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="text-right">
<div class="text-[56px] font-extrabold leading-none monospaced text-white tracking-tight">87</div>
<div class="text-[10px] font-bold uppercase tracking-[0.2em] text-tertiary">OVR</div>
</div>
</div>
<!-- 2. Avatar Region -->
<div class="relative flex-1 flex flex-col items-center justify-center -mt-4">
<div class="absolute inset-0 glow-behind rounded-full scale-125"></div>
<div class="relative w-[180px] h-[180px] drop-shadow-[0_20px_20px_rgba(0,0,0,0.6)]">
<img class="w-full h-full object-contain" data-alt="stylized anthropomorphic wolf athlete wearing a futuristic orange sports jersey, cinematic low-angle lighting, digital art style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-awKkllVeKt8mXa0tb2VPwEtrak47O6O2h9N7ftUWtINtxXYw2dztPrYDvXehGSCO0By5P9DIb__qDwbMg4-p3GXgjdTHhWM_E3mF7oxFD59NenWrh3DEnHXRINONwFk5wD6xiLWKvlSgCsyWsSGSB62xKERnJX9qXgUfXgohBgryaALbNfo4eCMzfB20YXGxLrYH-YPVLIc9GlVtQ_SkQ9xQr49TeoAJ-yJ7mKs6QcR_vWrKEZObqF1xNwKslhNE4ZCwam8DjIg"/>
</div>
</div>
<!-- 3. Identity Block -->
<div class="flex flex-col items-center gap-1 mb-6">
<div class="bg-secondary px-3 py-0.5 rounded-full">
<span class="text-[9px] font-black text-on-secondary-fixed uppercase tracking-wider">MID</span>
</div>
<div class="text-primary-container text-base font-extrabold tracking-[0.2em] uppercase">SPEEDSTER</div>
<div class="text-tertiary text-xs italic opacity-80 font-medium">"Fast feet, faster brain."</div>
</div>
<!-- 4. Stat Grid -->
<div class="grid grid-cols-2 gap-4 px-4 mb-6">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container text-xl">bolt</span>
<div>
<div class="text-xl font-extrabold leading-tight text-white monospaced">92</div>
<div class="text-[9px] font-bold text-tertiary uppercase tracking-widest">SPD</div>
</div>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container text-xl">sports_soccer</span>
<div>
<div class="text-xl font-extrabold leading-tight text-white monospaced">78</div>
<div class="text-[9px] font-bold text-tertiary uppercase tracking-widest">TCH</div>
</div>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container text-xl">visibility</span>
<div>
<div class="text-xl font-extrabold leading-tight text-white monospaced">85</div>
<div class="text-[9px] font-bold text-tertiary uppercase tracking-widest">VIS</div>
</div>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container text-xl">fitness_center</span>
<div>
<div class="text-xl font-extrabold leading-tight text-white monospaced">80</div>
<div class="text-[9px] font-bold text-tertiary uppercase tracking-widest">WRK</div>
</div>
</div>
</div>
<!-- 5. Move Loadout -->
<div class="flex justify-center gap-3 mb-4">
<div class="w-11 h-11 rounded-[12px] bg-surface-container-high border border-white/5 flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-xs text-secondary">content_cut</span>
<span class="text-[7px] font-bold uppercase text-on-surface-variant mt-0.5">Scissor</span>
</div>
<div class="w-11 h-11 rounded-[12px] bg-surface-container-high border border-white/5 flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-xs text-secondary">directions_run</span>
<span class="text-[7px] font-bold uppercase text-on-surface-variant mt-0.5">Step-Over</span>
</div>
<div class="w-11 h-11 rounded-[12px] bg-surface-container-high border border-white/5 flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-xs text-secondary">swap_horiz</span>
<span class="text-[7px] font-bold uppercase text-on-surface-variant mt-0.5">Feint</span>
</div>
<div class="w-11 h-11 rounded-[12px] bg-surface-container-high border border-white/5 flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-xs text-secondary">sync_alt</span>
<span class="text-[7px] font-bold uppercase text-on-surface-variant mt-0.5">Croqueta</span>
</div>
</div>
<!-- 6. Footer -->
<div class="text-center mt-auto">
<span class="text-[9px] font-extrabold tracking-[0.4em] text-tertiary opacity-40 uppercase">PITCHDREAMS</span>
</div>
</div>
</div>
<!-- Helper Text -->
<p class="mt-10 text-on-surface-variant text-[11px] font-medium opacity-60">
            Long-press to AirDrop. Tap to edit.
        </p>
</main>
<!-- Bottom Action Placeholder (Safe Area Aware) -->
<footer class="h-20 flex items-center justify-center px-6 mb-4">
<button class="w-full h-14 bg-gradient-to-r from-[#FFE6DE] to-[#FFD4C8] rounded-full flex items-center justify-center shadow-[0_8px_24px_-4px_rgba(255,107,44,0.4)]">
<span class="text-surface font-black uppercase tracking-widest text-sm">Update Player Style</span>
</button>
</footer>
</body></html>
