<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ghost-border {
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-x-hidden">
<!-- TopAppBar Fragment from Shared Components -->
<header class="bg-[#0C1322] flex justify-between items-center w-full px-6 h-16 fixed top-0 z-50">
<div class="flex items-center">
<span class="material-symbols-outlined text-[#FF6B2C] cursor-pointer" data-icon="arrow_back">arrow_back</span>
</div>
<div class="font-['Plus_Jakarta_Sans'] font-bold uppercase tracking-widest text-[11px] text-[#FF6B2C]">
            PITCHDREAMS
        </div>
<div class="flex items-center">
<span class="material-symbols-outlined text-[#FF6B2C] cursor-pointer" data-icon="metronome">timer</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 px-6 pb-40 flex flex-col items-center">
<!-- Top Section: Visual Guide & Toasts -->
<div class="w-full relative flex flex-col items-center pt-8 mb-8">
<!-- Floating Elements Container -->
<div class="absolute top-0 right-0 flex flex-col items-end gap-3">
<!-- Instruction Toast -->
<div class="bg-primary-container text-on-primary-container px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
<span class="font-label text-[11px] font-bold uppercase tracking-wider">Lean into it!</span>
</div>
<!-- Metronome Toggle -->
<div class="bg-surface-container-high px-3 py-1.5 rounded-full ghost-border flex items-center gap-2 hover:opacity-80 transition-opacity cursor-pointer">
<span class="text-[10px] text-on-surface">♩</span>
<span class="font-label text-[9px] font-bold uppercase tracking-widest text-secondary">METRONOME</span>
</div>
</div>
<!-- Motion Graphic Placeholder (Large Figure) -->
<div class="relative mt-8">
<span class="material-symbols-outlined text-[180pt] text-[#8B5CF6] leading-none opacity-90 select-none" data-icon="figure_walk_motion">assist_walker</span>
<!-- Visual Motion Lines -->
<div class="absolute -left-8 top-1/2 -translate-y-1/2 flex flex-col gap-2">
<div class="h-1 w-12 bg-[#8B5CF6]/30 rounded-full"></div>
<div class="h-1 w-8 bg-[#8B5CF6]/20 rounded-full"></div>
</div>
<div class="absolute -right-8 top-1/2 -translate-y-1/2 flex flex-col gap-2 items-end">
<div class="h-1 w-12 bg-[#8B5CF6]/30 rounded-full"></div>
<div class="h-1 w-8 bg-[#8B5CF6]/20 rounded-full"></div>
</div>
</div>
</div>
<!-- Middle Section: Interaction Core -->
<div class="flex flex-col items-center justify-center gap-6">
<div class="relative flex items-center justify-center">
<!-- Cyan Progress Ring (SVG) -->
<svg class="absolute w-[260px] h-[260px] -rotate-90">
<circle cx="130" cy="130" fill="transparent" r="120" stroke="#191F2F" stroke-width="4"></circle>
<circle cx="130" cy="130" fill="transparent" r="120" stroke="#46E5F8" stroke-dasharray="753.98" stroke-dashoffset="301.59" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<!-- Rep Counter Button -->
<button class="w-[220px] h-[220px] bg-primary-container rounded-[48px] flex flex-col items-center justify-center shadow-[0_20px_50px_rgba(255,107,44,0.3)] active:scale-95 transition-transform duration-150 group">
<span class="font-mono text-[72pt] font-black leading-none text-on-primary-container">24</span>
<span class="font-label text-[11px] font-bold uppercase tracking-[3pt] text-on-primary-container mt-2 opacity-60">TAP REPS</span>
</button>
</div>
<!-- Target Label -->
<div class="mt-4 flex flex-col items-center">
<span class="font-label text-[11px] font-bold uppercase tracking-[3pt] text-on-surface">TARGET: 40 REPS</span>
<!-- Mini Progress Visualizer -->
<div class="mt-3 w-48 h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-secondary w-[60%]"></div>
</div>
</div>
</div>
<!-- Bottom Section: Insights -->
<div class="w-full max-w-sm mt-12">
<div class="bg-surface-container-low rounded-lg p-5 ghost-border">
<div class="flex items-start gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-xl shrink-0">
                        🚫
                    </div>
<div class="flex flex-col gap-1">
<span class="font-label text-[10px] font-extrabold uppercase tracking-widest text-error">Common Mistake</span>
<p class="text-on-surface text-sm font-medium">Don't look at your feet! Keep your chin up to scan the field.</p>
</div>
</div>
</div>
</div>
</main>
<!-- Sticky Bottom Actions -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-6 bg-gradient-to-t from-background via-background to-transparent pointer-events-none">
<div class="max-w-md mx-auto flex flex-col items-center gap-4 pointer-events-auto">
<!-- CTA Button (Greyed out state) -->
<button class="w-full h-14 bg-surface-container-highest text-on-surface/40 rounded-full font-bold uppercase tracking-widest text-sm flex items-center justify-center cursor-not-allowed ghost-border">
                I'M DONE
            </button>
<!-- Skip Link -->
<a class="font-label text-[11px] font-bold uppercase tracking-[2pt] text-secondary hover:opacity-80 transition-opacity" href="#">
                Skip drill
            </a>
</div>
</div>
