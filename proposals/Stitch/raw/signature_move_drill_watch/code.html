            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface font-body selection:bg-secondary/30">
<div class="flex flex-col min-h-screen">
<!-- Header: Minimal Back Navigation -->
<header class="flex items-center px-4 pt-6 pb-2">
<button class="flex items-center justify-center size-10 rounded-full surface-container-high ghost-border">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="ml-4">
<p class="text-[10px] font-bold tracking-[0.2em] uppercase text-secondary">Signature Move</p>
<h1 class="text-lg font-extrabold text-white leading-none">THE SCISSOR</h1>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto pb-32">
<!-- Video Player Section -->
<section class="mt-4 px-4">
<div class="relative w-full aspect-[9/12] rounded-xl overflow-hidden bg-surface-container-lowest ghost-border">
<!-- Background Placeholder: Stylized pro player blurred -->
<div class="absolute inset-0 bg-cover bg-center opacity-60 grayscale scale-105" data-alt="dynamic close-up of a professional soccer player feet performing a dribble move on grass, dramatic lighting with motion blur" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCBv4TCLNNgOAtViXYeB6hEtNpy1YtG92RgG2QI7LhXAuUPTX90iIa6JhJc1b8dS734ZE1ZERAKAcZYxAtBj8q2UEhxmi0SEOF4EHWp3x3QKGncbOprVW8UTMogIkkdwUgAktGbCdYMA-1D1OikOR69N6HE11bKJU7fpmM4un_bAGp4BKFBxT6s6vn4wQKnFW0GVtRZEk56CAYVtSPrLygwAJZYOf0WN3BFwRGSMSAkrMADKPp-3Li2SLjAadqw4v2LDsB8xIia_2k");'>
</div>
<!-- Centered Play Button -->
<div class="absolute inset-0 flex items-center justify-center">
<button class="size-20 flex items-center justify-center rounded-full bg-secondary/20 border-2 border-secondary text-secondary shadow-[0_0_40px_rgba(70,229,248,0.2)]">
<span class="material-symbols-outlined !text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Video Controls Overlay -->
<div class="absolute inset-x-0 bottom-0 p-6 flex flex-col gap-4 bg-gradient-to-t from-surface-container-lowest to-transparent">
<!-- Progress Bar -->
<div class="w-full h-1.5 bg-white/20 rounded-full relative overflow-hidden">
<div class="absolute inset-y-0 left-0 w-[25%] bg-secondary rounded-full"></div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="text-xs font-mono font-bold tracking-tight text-white">0:15 / 1:00</span>
<button class="px-3 py-1 rounded-full bg-white/10 ghost-border text-[10px] font-bold text-white tracking-widest">0.5X</button>
</div>
<button class="text-white/80">
<span class="material-symbols-outlined !text-xl">replay</span>
</button>
</div>
</div>
</div>
</section>
<!-- Coach Caption Strip -->
<section class="mt-6 px-4">
<div class="p-6 rounded-lg bg-surface-container ghost-border">
<p class="text-[10px] font-bold tracking-[0.2em] uppercase text-secondary mb-2">COACH CUE</p>
<p class="text-base font-medium text-white leading-relaxed">
                        Watch the plant foot. See the hip swivel. Notice the explosion the other way.<span class="inline-block w-[2px] h-5 bg-secondary align-middle ml-1"></span>
</p>
</div>
</section>
<!-- Common Mistake Card -->
<section class="mt-4 px-4">
<div class="flex rounded-lg bg-surface-container-high ghost-border overflow-hidden">
<div class="w-1 bg-primary/40"></div>
<div class="p-4">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary !text-sm">warning</span>
<p class="text-[9px] font-bold tracking-[0.2em] uppercase text-primary/80">Common Mistake</p>
</div>
<p class="text-sm font-medium text-on-surface-variant leading-normal">
                            Don't lean too late! If your weight isn't committed to the fake, the defender won't bite.
                        </p>
</div>
</div>
</section>
</main>
<!-- Sticky Bottom CTA Area -->
<footer class="fixed bottom-0 inset-x-0 bg-gradient-to-t from-background via-background to-transparent pt-12 pb-8 px-6 text-center pointer-events-none">
<div class="pointer-events-auto max-w-md mx-auto">
<p class="text-[11px] font-bold tracking-[0.2em] uppercase text-secondary mb-4 opacity-80">0:45 remaining</p>
<button class="w-full h-[56px] rounded-full border-2 border-secondary flex items-center justify-center group active:scale-[0.98] transition-transform">
<span class="text-secondary text-[13px] font-extrabold tracking-[0.25em] uppercase">I'VE WATCHED THIS</span>
</button>
<!-- Spacer for safe area -->
<div class="h-4"></div>
</div>
</footer>
</div>
