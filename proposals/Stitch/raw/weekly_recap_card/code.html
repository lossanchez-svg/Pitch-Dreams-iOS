<body class="flex items-center justify-center min-h-screen p-4">

</div>

</div>

<span class="font-bold tracking-widest uppercase text-[8px] text-on-tertiary">ROOKIE</span>
</div>
</div>
<!-- Sessions Display -->
<div class="text-center">
<h2 class="text-6xl font-extrabold monospaced-digits text-on-background leading-none">5</h2>
<p class="font-bold tracking-[0.2em] uppercase text-[11px] text-slate-500 mt-2">SESSIONS</p>

<div class="w-[90px] h-[70px] bg-white/[0.06] rounded-xl flex flex-col items-center justify-center gap-1 border border-white/5">

<span class="text-sm font-bold text-on-surface">2h30</span>
<span class="font-bold tracking-widest uppercase text-[8px] text-slate-500">TIME</span>

</div>
<div class="flex flex-col items-center gap-2">

</div>
</div>
